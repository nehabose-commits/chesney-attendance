<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AttendX — Chesney Enterprises Private Limited</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#0f1028;--surface:#181a3a;--surface2:#20234a;--surface3:#282c58;
  --border:rgba(123,127,196,0.2);--border2:rgba(123,127,196,0.38);
  --text:#eeeeff;--muted:#8888bb;
  --red:#e03535;--red2:#b02020;
  --purple:#7b7fc4;--purple2:#9b9fe0;
  --green:#4caf82;--danger:#e03535;--warn:#e09540;--cyan:#00c9a7;
  --font:'Poppins',sans-serif;--display:'Orbitron',sans-serif;
  --r:16px;--r2:10px;--r3:8px;
}
html,body{min-height:100vh;background:var(--bg);color:var(--text);font-family:var(--font);overflow-x:hidden;}
#app{min-height:100vh;}

.bg-dots{position:fixed;inset:0;background-image:radial-gradient(rgba(123,127,196,0.07) 1px,transparent 1px);background-size:28px 28px;pointer-events:none;z-index:0;}
.bg-glow-top{position:fixed;top:-150px;left:50%;transform:translateX(-50%);width:600px;height:400px;background:radial-gradient(ellipse,rgba(224,53,53,0.08) 0%,transparent 65%);pointer-events:none;z-index:0;}
.bg-glow-bot{position:fixed;bottom:-150px;right:-100px;width:500px;height:400px;background:radial-gradient(ellipse,rgba(123,127,196,0.1) 0%,transparent 65%);pointer-events:none;z-index:0;}

/* ── LOADING ── */
.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:20px;position:relative;z-index:1;}
.spinner{width:36px;height:36px;border:2px solid var(--border2);border-top-color:var(--red);border-radius:50%;animation:spin 0.8s linear infinite;}
.spinner-sm{width:18px;height:18px;border:2px solid rgba(255,255,255,0.2);border-top-color:#fff;border-radius:50%;animation:spin 0.8s linear infinite;display:inline-block;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ── LOGIN ── */
.login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:2rem 1.25rem;position:relative;z-index:1;}

.brand-block{text-align:center;margin-bottom:2.5rem;}
.brand-emblem{display:inline-flex;align-items:center;justify-content:center;width:68px;height:68px;border-radius:20px;border:1.5px solid var(--red);background:rgba(224,53,53,0.08);margin-bottom:18px;position:relative;}
.brand-emblem::after{content:'';position:absolute;inset:-5px;border-radius:25px;border:1px solid rgba(224,53,53,0.12);}
.brand-company{font-family:var(--display);font-size:22px;font-weight:700;color:#fff;letter-spacing:2px;line-height:1.2;}
.brand-tagline{font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-top:8px;}
.brand-line{width:50px;height:1.5px;background:linear-gradient(90deg,transparent,var(--red),transparent);margin:12px auto 0;}

.login-card{background:var(--surface);border:1px solid var(--border2);border-radius:var(--r);padding:2rem 1.75rem;width:100%;max-width:400px;position:relative;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,0.4);}
.login-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--red),var(--purple),transparent);}

.login-greeting{font-size:18px;font-weight:600;margin-bottom:16px;text-align:center;}
.login-sub{font-size:12px;color:var(--muted);margin-bottom:1.75rem;line-height:1.5;}

.field{margin-bottom:16px;}
.field label{font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;display:block;margin-bottom:7px;font-weight:500;}
.input-wrap{position:relative;}
.input-wrap svg{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none;}
.field input{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:var(--font);font-size:14px;padding:12px 14px 12px 40px;border-radius:var(--r2);outline:none;transition:border-color 0.2s,background 0.2s;}
.field input:focus{border-color:var(--purple2);background:var(--surface3);}
.field input::placeholder{color:var(--muted);}
.domain-tag{display:flex;align-items:center;gap:6px;margin-top:6px;font-size:10px;color:var(--muted);}
.domain-tag span{color:var(--purple2);font-weight:500;}
.err-msg{background:rgba(224,53,53,0.08);border:1px solid rgba(224,53,53,0.2);border-radius:var(--r3);padding:10px 12px;font-size:11px;color:var(--red);text-align:center;margin-bottom:14px;display:none;}
.err-msg.show{display:block;}

.btn-primary{background:linear-gradient(135deg,var(--red2),var(--red));color:#fff;border:none;border-radius:var(--r2);font-family:var(--font);font-size:14px;font-weight:600;padding:13px;cursor:pointer;width:100%;letter-spacing:0.5px;transition:opacity 0.2s,transform 0.1s;box-shadow:0 4px 20px rgba(224,53,53,0.3);}
.btn-primary:hover{opacity:0.9;}
.btn-primary:active{transform:scale(0.98);}
.btn-primary:disabled{opacity:0.5;cursor:not-allowed;transform:none;}
.btn-ghost{background:transparent;border:1px solid var(--border2);color:var(--text);border-radius:var(--r2);font-family:var(--font);font-size:13px;padding:11px;cursor:pointer;width:100%;transition:all 0.2s;}
.btn-ghost:hover{background:var(--surface2);border-color:var(--purple2);}
.btn-icon-sm{background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:var(--r3);font-family:var(--font);font-size:11px;padding:5px 11px;cursor:pointer;transition:all 0.2s;}
.btn-icon-sm:hover{border-color:var(--border2);color:var(--text);}
.btn-danger-sm{background:rgba(224,53,53,0.1);border:1px solid rgba(224,53,53,0.25);color:var(--red);border-radius:var(--r3);font-family:var(--font);font-size:11px;padding:5px 11px;cursor:pointer;}

/* ── SET PIN ── */
.setpin-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:2rem 1.25rem;position:relative;z-index:1;}
.setpin-card{background:var(--surface);border:1px solid var(--border2);border-radius:var(--r);padding:2rem 1.75rem;width:100%;max-width:400px;position:relative;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,0.4);}
.setpin-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--purple),var(--red),transparent);}
.setpin-icon{width:56px;height:56px;background:rgba(123,127,196,0.1);border:1px solid var(--border2);border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;}

/* ── HEADER ── */
.header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:rgba(24,26,58,0.96);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;backdrop-filter:blur(12px);}
.header-logo{font-family:var(--display);font-size:12px;color:#fff;letter-spacing:2px;display:flex;align-items:center;gap:8px;}
.logo-dot{width:7px;height:7px;border-radius:50%;background:var(--red);}
.header-right{display:flex;align-items:center;gap:10px;}
.emp-av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--display);font-weight:600;flex-shrink:0;border:1.5px solid var(--border2);}

/* ── NAV ── */
.nav-tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none;position:sticky;top:58px;z-index:99;}
.nav-tabs::-webkit-scrollbar{display:none;}
.nav-tab{flex:1;min-width:70px;padding:12px 8px;text-align:center;font-size:11px;font-weight:500;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all 0.2s;white-space:nowrap;letter-spacing:0.3px;}
.nav-tab.active{color:var(--red);border-bottom-color:var(--red);}
.nav-tab:hover{color:var(--text);}

/* ── PAGE ── */
.page{max-width:640px;margin:0 auto;padding:16px;display:flex;flex-direction:column;gap:14px;position:relative;z-index:1;}
.section-label{font-size:10px;color:var(--red);text-transform:uppercase;letter-spacing:1.2px;font-weight:600;display:flex;align-items:center;gap:8px;}
.section-label::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--border),transparent);}

/* ── PUNCH CARD ── */
.punch-card{background:var(--surface);border:1px solid var(--border2);border-radius:var(--r);padding:1.5rem;position:relative;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,0.2);}
.punch-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--red),var(--purple));}
.punch-card::after{content:'';position:absolute;bottom:-20px;right:-20px;width:140px;height:140px;background:radial-gradient(circle,rgba(224,53,53,0.05) 0%,transparent 70%);pointer-events:none;}
.time-display{font-family:var(--display);font-size:34px;color:#fff;letter-spacing:3px;font-weight:400;}
.date-display{font-size:11px;color:var(--muted);margin-top:5px;letter-spacing:0.3px;}
.punch-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px;}
.month-count{text-align:right;}
.month-count-val{font-family:var(--display);font-size:22px;color:var(--purple2);}
.month-count-lbl{font-size:10px;color:var(--muted);margin-top:2px;}

.status-bar{border-radius:var(--r2);padding:12px 14px;display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.status-bar.active{background:rgba(76,175,130,0.08);border:1px solid rgba(76,175,130,0.25);}
.status-bar.done{background:rgba(0,201,167,0.07);border:1px solid rgba(0,201,167,0.2);}
.status-bar.absent{background:rgba(224,149,64,0.07);border:1px solid rgba(224,149,64,0.2);justify-content:center;font-size:12px;color:var(--warn);}
.slbl{font-size:10px;color:var(--muted);margin-bottom:3px;}
.sval{font-family:var(--display);font-size:13px;}

.punch-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.btn-in{background:rgba(76,175,130,0.1);border:1px solid rgba(76,175,130,0.3);color:var(--green);border-radius:var(--r2);padding:14px;font-family:var(--font);font-size:13px;font-weight:500;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:8px;}
.btn-in:hover:not(:disabled){background:rgba(76,175,130,0.18);}
.btn-in:disabled{opacity:0.3;cursor:not-allowed;}
.btn-out{background:rgba(224,53,53,0.1);border:1px solid rgba(224,53,53,0.3);color:var(--red);border-radius:var(--r2);padding:14px;font-family:var(--font);font-size:13px;font-weight:500;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:8px;}
.btn-out:hover:not(:disabled){background:rgba(224,53,53,0.18);}
.btn-out:disabled{opacity:0.3;cursor:not-allowed;}
.loc-bar{display:flex;align-items:center;gap:7px;background:var(--surface2);border:1px solid var(--border);border-radius:30px;padding:7px 14px;font-size:10px;color:var(--muted);margin-top:10px;}
.btn-absent{background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:var(--r2);font-family:var(--font);font-size:12px;padding:10px;cursor:pointer;width:100%;margin-top:8px;transition:all 0.2s;letter-spacing:0.3px;}
.btn-absent:hover{border-color:var(--warn);color:var(--warn);}

/* ── STATS ── */
.stat-strip{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.stat-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:14px 10px;text-align:center;}
.stat-num{font-family:var(--display);font-size:22px;font-weight:500;}
.stat-lbl{font-size:10px;color:var(--muted);margin-top:4px;letter-spacing:0.3px;}

/* ── ATT ROWS ── */
.att-row{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:12px 14px;transition:border-color 0.2s;}
.att-row:hover{border-color:var(--border2);}
.att-top{display:flex;justify-content:space-between;align-items:center;}
.att-date{font-size:11px;color:var(--muted);}
.att-dur{font-family:var(--display);font-size:12px;color:var(--cyan);}
.att-times{font-family:var(--display);font-size:11px;margin-top:5px;}
.att-loc{font-size:10px;color:var(--muted);margin-top:4px;word-break:break-all;line-height:1.5;}

/* ── CHANGE PIN ── */
.pin-card{background:var(--surface);border:1px solid var(--border2);border-radius:var(--r);padding:1.4rem;position:relative;overflow:hidden;}
.pin-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--purple),var(--red));}

/* ── ADMIN ── */
.admin-badge{background:rgba(224,53,53,0.12);color:var(--red);border:1px solid rgba(224,53,53,0.3);font-size:10px;padding:3px 10px;border-radius:4px;font-weight:500;font-family:var(--display);letter-spacing:1px;}
.emp-row{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:13px 14px;display:flex;align-items:center;gap:12px;transition:border-color 0.2s;}
.emp-row:hover{border-color:var(--border2);}
.add-card{background:var(--surface);border:1px solid var(--purple);border-radius:var(--r);padding:1.4rem;display:flex;flex-direction:column;gap:12px;position:relative;overflow:hidden;}
.add-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--purple),transparent);}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);display:flex;align-items:center;justify-content:center;z-index:500;padding:1.5rem;backdrop-filter:blur(5px);}
.modal-box{background:var(--surface);border:1px solid var(--border2);border-radius:var(--r);padding:1.75rem;width:100%;max-width:320px;position:relative;overflow:hidden;}
.modal-box::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--red),var(--purple));}
.modal-title{font-family:var(--display);font-size:13px;color:var(--red);margin-bottom:8px;letter-spacing:1px;}
.modal-body{font-size:12px;color:var(--muted);margin-bottom:20px;line-height:1.7;}
.modal-actions{display:flex;gap:10px;}

/* ── TOAST ── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--surface3);border:1px solid var(--border2);border-radius:30px;padding:11px 22px;font-size:12px;z-index:1000;white-space:nowrap;animation:tin 0.25s ease;pointer-events:none;box-shadow:0 6px 24px rgba(0,0,0,0.4);}
@keyframes tin{from{opacity:0;transform:translateX(-50%) translateY(12px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}

.empty{text-align:center;padding:2.5rem 1rem;color:var(--muted);font-size:13px;line-height:2;}
select option{background:var(--surface2);}
</style>
</head>
<body>
<div class="bg-dots"></div>
<div class="bg-glow-top"></div>
<div class="bg-glow-bot"></div>
<div id="app"></div>

<script>
// ════════════════════════════════════════════════════════
// ★ Paste your Google Apps Script Web App URL here
// ════════════════════════════════════════════════════════
const SCRIPT_URL = 'YOUR_APPS_SCRIPT_WEB_APP_URL';

// ════════════════════════════════════════════════════════
// Admin email & PIN — only this person gets admin access
// ════════════════════════════════════════════════════════
const ADMIN_EMAIL = 'chesney@chesneyindia.com';
const ADMIN_PIN   = '123456'; // ← Change this to your personal admin PIN

// ════════════════════════════════════════════════════════
// Allowed email domain — any other domain is rejected
// ════════════════════════════════════════════════════════
const DOMAIN = '@chesneyindia.com';

// ════════════════════════════════════════════════════════

const todayKey = () => new Date().toISOString().slice(0,10);
const monthKey = () => new Date().toISOString().slice(0,7);
const fmtTime  = d => { if(!(d instanceof Date))d=new Date(d); return d.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',hour12:true}); };
const fmtDate  = d => { try{if(!(d instanceof Date))d=new Date(d);return d.toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});}catch{return d;} };
const diffH    = (a,b) => { const ms=Math.abs(new Date(b)-new Date(a)); return Math.floor(ms/3600000)+'h '+Math.floor((ms%3600000)/60000)+'m'; };
const initials = n => n.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
const avStyle  = g => g==='female'?'background:rgba(224,53,53,0.15);color:#e03535;border-color:rgba(224,53,53,0.3);':'background:rgba(123,127,196,0.15);color:#9b9fe0;border-color:rgba(123,127,196,0.3);';

let S = {
  view:'loading',
  emp:null,           // { name, email, gender }
  tab:'punch',
  adminTab:'employees',
  attendance:[],
  todayRec:null,
  liveTime:new Date(),
  toast:null,
  loginErr:'',
  setPinErr:'',
  modal:null,
  adminEmps:[],
  resetEmail:null,
  resetStep:null,
};

const save  = v => { try{localStorage.setItem('cx_v2',JSON.stringify(v));}catch{} };
const load  = ()  => { try{const v=localStorage.getItem('cx_v2');return v?JSON.parse(v):null;}catch{return null;} };
const clear = ()  => { try{localStorage.removeItem('cx_v2');}catch{} };

async function api(payload) {
  try {
    const r = await fetch(SCRIPT_URL,{method:'POST',body:JSON.stringify(payload)});
    return await r.json();
  } catch{ return {ok:false,error:'Network error. Check your connection.'}; }
}
async function fetchMonth(email) {
  try {
    const r = await fetch(SCRIPT_URL+'?email='+encodeURIComponent(email)+'&month='+monthKey());
    return await r.json();
  } catch{ return []; }
}

function toast(msg) { S.toast=msg; render(); setTimeout(()=>{S.toast=null;render();},2800); }

function getLocation() {
  return new Promise(res => {
    if(!navigator.geolocation){res(null);return;}
    navigator.geolocation.getCurrentPosition(
      p => res(p.coords.latitude.toFixed(5)+', '+p.coords.longitude.toFixed(5)),
      () => res(null),{timeout:10000,enableHighAccuracy:true}
    );
  });
}

async function loadAtt() {
  const rows = await fetchMonth(S.emp.email);
  S.attendance = Array.isArray(rows)?rows:[];
  S.todayRec   = S.attendance.find(r=>r.date===todayKey())||null;
}

async function loadAdminEmps() {
  const res = await api({action:'getEmployees',adminPin:ADMIN_PIN});
  if(res.ok) S.adminEmps = res.employees||[];
}

// ── Init ──────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', async () => {
  const saved = load();
  if(saved?.email) {
    if(saved.isAdmin) {
      S.view='loading'; render();
      save({isAdmin:true,email:ADMIN_EMAIL});
      await loadAdminEmps();
      S.view='admin';
    } else {
      S.emp={name:saved.name,email:saved.email,gender:saved.gender};
      S.view='loading'; render();
      await loadAtt();
      S.view='main';
    }
  } else {
    S.view='login';
  }
  render();

  setInterval(()=>{
    S.liveTime=new Date();
    const t=document.getElementById('lt');
    if(t) t.textContent=S.liveTime.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false});
    const rd=document.getElementById('rd');
    if(rd&&S.todayRec?.punchIn&&!S.todayRec?.punchOut) rd.textContent=diffH(S.todayRec.punchIn,new Date());
  },1000);
});

// ── Render ────────────────────────────────────────────
function render() {
  const app=document.getElementById('app');
  const th=S.toast?`<div class="toast">${S.toast}</div>`:'';
  const mo=S.modal?renderModal():'';
  if(S.view==='loading'){app.innerHTML=`<div class="loading-screen"><div class="spinner"></div><div style="font-size:12px;color:var(--muted);letter-spacing:1px;">Loading…</div></div>`;return;}
  if(S.view==='login')  {renderLogin(app,th);return;}
  if(S.view==='setpin') {renderSetPin(app,th);return;}
  if(S.view==='resetpin'){renderResetPin(app,th);return;}
  if(S.view==='admin') {renderAdmin(app,th,mo);return;}
  renderMain(app,th,mo);
}

// ── LOGIN ─────────────────────────────────────────────
function renderLogin(app,th) {
  app.innerHTML=`

    <div class="login-card">
      <div class="login-greeting">Welcome Back 👋</div>
      

      <div class="field">
        <label>Office Email</label>
        <div class="input-wrap">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>

        ${S.loginErr === '__INVALID_PIN__' ? `
          <div style="background:rgba(224,53,53,0.08);border:1px solid rgba(224,53,53,0.25);border-radius:10px;padding:14px;margin-bottom:14px;display:flex;flex-direction:column;gap:8px;">

            <button class="btn-ghost" id="reset-pin-btn" style="font-size:12px;padding:9px;border-color:rgba(224,53,53,0.4);color:var(--red);margin-top:2px;">📧 Send Reset Code to My Email</button>

  // errors handled inline

  function showLoginErr(msg) {
    const eb = document.getElementById('err-block');
    if(eb) eb.innerHTML = '<div class="err-msg show">'+msg+'</div>';
  }

  const doLogin = async () => {
    const email = document.getElementById('emp-email').value.trim().toLowerCase();
    const pin   = document.getElementById('emp-pin').value.trim();

    if(!email){ showLoginErr('Please enter your email.'); return; }
    if(pin.length<6){ showLoginErr('PIN must be 6 digits.'); return; }

    // Admin login
    if(email===ADMIN_EMAIL) {
      if(pin!==ADMIN_PIN){ showLoginErr('Invalid PIN.'); return; }
      S.loginErr=''; S.view='loading'; render();
      save({isAdmin:true,email:ADMIN_EMAIL});
      await loadAdminEmps();
      S.view='admin'; render(); return;
    }

    S.view='loading'; render();
    const res = await api({action:'login',email,pin});
    if(!res.ok){
      S.view='login';
      if(res.error && res.error.toLowerCase().includes('pin')) {
        S.loginErr='__INVALID_PIN__';
        S.resetEmail = email;
      } else {
        S.loginErr = res.error||'Login failed. Check your email.';
      }
      render(); return;
    }

    S.loginErr='';
    S.emp={name:res.name,email,gender:res.gender||'male'};
    if(res.firstLogin){ S.view='setpin'; render(); return; }
    save({name:res.name,email,gender:S.emp.gender});
    await loadAtt();
    S.view='main'; render();
  };

  document.getElementById('login-btn').onclick=doLogin;
  document.getElementById('emp-pin').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
  document.getElementById('emp-email').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('emp-pin').focus();});
  const resetBtn=document.getElementById('reset-pin-btn');
  if(resetBtn)resetBtn.onclick=async()=>{
    resetBtn.textContent='Sending…';resetBtn.disabled=true;
    const res=await api({action:'sendResetCode',email:S.resetEmail});
    if(res.ok){S.view='resetpin';S.resetStep='verify';toast('Reset code sent to your email!');render();}

// ── PUNCH TAB ─────────────────────────────────────────
function renderPunch(el) {
  const emp=S.emp,rec=S.todayRec,now=S.liveTime;
  const ts=now.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false});
  const ds=now.toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  const daysWorked=S.attendance.filter(r=>r.punchIn&&r.punchOut).length;
  const isPunchedIn=rec?.punchIn&&!rec?.punchOut&&rec?.status!=='absent';
  const isDone=(rec?.punchIn&&rec?.punchOut)||rec?.status==='absent';

  let sb='';
  if(rec?.status==='absent')sb=`<div class="status-bar absent">📋 Marked as not coming today</div>`;
  else if(rec?.punchIn&&rec?.punchOut)sb=`<div class="status-bar done"><div><div class="slbl">Today completed</div><div class="sval" style="color:var(--cyan);">${diffH(rec.punchIn,rec.punchOut)}</div></div><div style="text-align:right;"><div class="slbl">In → Out</div><div class="sval" style="font-size:11px;">${fmtTime(rec.punchIn)} → ${fmtTime(rec.punchOut)}</div></div></div>`;
  else if(rec?.punchIn)sb=`<div class="status-bar active"><div><div class="slbl">Punched in at</div><div class="sval" style="color:var(--green);">${fmtTime(rec.punchIn)}</div></div><div style="text-align:right;"><div class="slbl">Working for</div><div class="sval" id="rd">${diffH(rec.punchIn,new Date())}</div></div></div>`;

  el.innerHTML=`
  <div class="punch-card">
    <div class="punch-top">
      <div><div class="time-display" id="lt">${ts}</div><div class="date-display">${ds}</div></div>
      <div class="month-count"><div class="month-count-val">${daysWorked}</div><div class="month-count-lbl">Days this month</div></div>
    </div>
    ${sb}
    <div class="punch-btns">
      <button class="btn-in" id="btn-in" ${isPunchedIn||isDone?'disabled':''}>
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="10" r="3"/><path d="M12 2a8 8 0 0 0-8 8c0 5.25 8 14 8 14s8-8.75 8-14a8 8 0 0 0-8-8z"/></svg>
        Punch In
      </button>
      <button class="btn-out" id="btn-out" ${!isPunchedIn?'disabled':''}>
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="10" r="3"/><path d="M12 2a8 8 0 0 0-8 8c0 5.25 8 14 8 14s8-8.75 8-14a8 8 0 0 0-8-8z"/></svg>
        Punch Out
      </button>
    </div>
    <div class="loc-bar">
      <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="10" r="3"/><path d="M12 2a8 8 0 0 0-8 8c0 5.25 8 14 8 14s8-8.75 8-14a8 8 0 0 0-8-8z"/></svg>
      ${rec?.punchInLoc?'Punched in @ '+rec.punchInLoc:'Your GPS location will be captured on punch'}
    </div>
    ${!isDone?`<button class="btn-absent" id="btn-absent">📋 Not coming today</button>`:''}
  </div>`;

  const biEl=el.querySelector('#btn-in');
  if(biEl)biEl.onclick=async()=>{
    biEl.innerHTML='<span class="spinner-sm"></span>';biEl.disabled=true;
    const loc=await getLocation(),now=new Date().toISOString();
    const res=await api({action:'punchIn',email:emp.email,name:emp.name,date:todayKey(),time:now,location:loc||''});
    if(res.ok){S.todayRec={date:todayKey(),punchIn:now,punchInLoc:loc||'',punchOut:null};if(!S.attendance.find(r=>r.date===todayKey()))S.attendance.unshift(S.todayRec);toast('Punched in'+(loc?' @ '+loc:''));}
    else toast('Error — '+res.error);
    renderPunch(el);
  };

  const boEl=el.querySelector('#btn-out');
  if(boEl)boEl.onclick=async()=>{
    boEl.innerHTML='<span class="spinner-sm"></span>';boEl.disabled=true;
    const loc=await getLocation(),now=new Date().toISOString();
    const res=await api({action:'punchOut',email:emp.email,date:todayKey(),time:now,location:loc||''});
    if(res.ok){if(S.todayRec){S.todayRec.punchOut=now;S.todayRec.punchOutLoc=loc||'';}toast('Punched out'+(loc?' @ '+loc:''));}
    else toast('Error — '+res.error);
    renderPunch(el);
  };

  const abEl=el.querySelector('#btn-absent');
  if(abEl)abEl.onclick=async()=>{
    if(!confirm('Mark yourself as not coming today?'))return;
    const res=await api({action:'markAbsent',email:emp.email,name:emp.name,date:todayKey()});
    if(res.ok){S.todayRec={date:todayKey(),status:'absent'};if(!S.attendance.find(r=>r.date===todayKey()))S.attendance.unshift(S.todayRec);toast('Marked as not coming today');}
    else toast('Error — '+res.error);
    renderPunch(el);
  };
}

// ── HISTORY TAB ───────────────────────────────────────
function renderHistory(el) {
  const now=new Date();
  const daysWorked=S.attendance.filter(r=>r.punchIn&&r.punchOut).length;
  const daysAbsent=S.attendance.filter(r=>r.status==='absent').length;
  const totalMins=S.attendance.reduce((s,r)=>{if(r.punchIn&&r.punchOut)s+=Math.abs(new Date(r.punchOut)-new Date(r.punchIn))/60000;return s;},0);
  const avgHrs=daysWorked>0?Math.floor(totalMins/daysWorked/60)+'h '+Math.floor((totalMins/daysWorked)%60)+'m':'—';

  el.innerHTML=`
  <div class="section-label">This Month — ${now.toLocaleDateString('en-IN',{month:'long',year:'numeric'})}</div>
  <div class="stat-strip">
    <div class="stat-box"><div class="stat-num" style="color:var(--green);">${daysWorked}</div><div class="stat-lbl">Days In</div></div>
    <div class="stat-box"><div class="stat-num" style="color:var(--warn);">${daysAbsent}</div><div class="stat-lbl">Absent</div></div>
    <div class="stat-box"><div class="stat-num" style="color:var(--cyan);font-size:15px;padding-top:4px;">${avgHrs}</div><div class="stat-lbl">Avg / Day</div></div>
  </div>
  <div class="section-label">Attendance Records</div>
  ${S.attendance.length===0?'<div class="empty">No records this month yet.<br>Punch in to start tracking!</div>':
  S.attendance.map(r=>{
    if(r.status==='absent')return`<div class="att-row"><div class="att-top"><div class="att-date">${fmtDate(r.date)}</div><div style="font-size:11px;color:var(--warn);">Not In</div></div></div>`;
    return`<div class="att-row">
      <div class="att-top"><div class="att-date">${fmtDate(r.date)}</div><div class="att-dur">${r.punchOut?diffH(r.punchIn,r.punchOut):'<span style="color:var(--green)">Active</span>'}</div></div>
      <div class="att-times"><span style="color:var(--green);">IN</span> ${r.punchIn?fmtTime(r.punchIn):'—'} <span style="color:var(--muted);margin:0 6px;">→</span><span style="color:var(--danger);">OUT</span> ${r.punchOut?fmtTime(r.punchOut):'—'}</div>
      ${r.punchInLoc||r.punchOutLoc?`<div class="att-loc">📍 ${r.punchInLoc?'In: '+r.punchInLoc:''}${r.punchOutLoc?' · Out: '+r.punchOutLoc:''}</div>`:''}
    </div>`;
  }).join('')}`;
}

  <div class="nav-tabs">
    ${tabs.map(t=>`<div class="nav-tab${S.adminTab===t.id?' active':''}" data-tab="${t.id}">${t.label}</div>`).join('')}
  </div>
  <div class="page" id="admin-content"></div>
  ${th}${mo}`;

  document.getElementById('signout').onclick=()=>{clear();S.view='login';S.loginErr='';S.adminEmps=[];render();};
  document.querySelectorAll('.nav-tab').forEach(el=>el.addEventListener('click',()=>{S.adminTab=el.dataset.tab;renderAdminTab();}));
  renderAdminTab();
}

function renderAdminTab() {
  const ac=document.getElementById('admin-content');
  if(!ac)return;
  if(S.adminTab==='employees') renderAdminEmps(ac);
  else renderAddEmp(ac);
}

function renderAdminEmps(el) {
  el.innerHTML=`
  <div class="section-label">All Employees (${S.adminEmps.length})</div>
  ${S.adminEmps.length===0?'<div class="empty">No employees yet.<br>Use the Add Employee tab to get started.</div>':
  S.adminEmps.map(e=>`
  <div class="emp-row">
    <div class="emp-av" style="${avStyle(e.gender)};width:40px;height:40px;font-size:12px;">${initials(e.name)}</div>
    <div style="flex:1;min-width:0;">
      <div style="font-size:13px;font-weight:500;">${e.name}</div>
      <div style="font-size:11px;color:var(--muted);margin-top:2px;">${e.email}</div>
    </div>
    <button class="btn-danger-sm" data-email="${e.email}" data-name="${e.name}">Remove</button>
  </div>`).join('')}`;

  el.querySelectorAll('[data-email]').forEach(btn=>btn.addEventListener('click',()=>{
    S.modal={type:'confirmDelete',name:btn.dataset.name,email:btn.dataset.email};render();
  }));
}

function renderAddEmp(el) {
  el.innerHTML=`
  <div class="add-card">
    <div>
      <div style="font-size:14px;font-weight:500;margin-bottom:4px;">Add New Employee</div>
      <div style="font-size:11px;color:var(--muted);">Their default PIN will be <strong style="color:var(--purple2);">123456</strong> — they must set a new one on first login.</div>
    </div>
    <div class="field"><label>Full Name</label><div class="input-wrap"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><input type="text" id="ne-name" placeholder="e.g. Riya Sharma"></div></div>
    <div class="field"><label>Office Email</label><div class="input-wrap"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg><input type="email" id="ne-email" placeholder="name@chesneyindia.com"></div></div>
    <div class="field"><label>Gender</label>
      <select id="ne-gender" style="background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:var(--font);font-size:13px;padding:12px 14px;border-radius:var(--r2);outline:none;appearance:none;width:100%;">
        <option value="male">Male</option>
        <option value="female">Female</option>
      </select>
    </div>
    <div class="err-msg" id="add-err"></div>
    <button class="btn-primary" id="add-btn">Add Employee</button>
  </div>`;

  el.querySelector('#add-btn').onclick=async()=>{
    const name=el.querySelector('#ne-name').value.trim();
    const email=el.querySelector('#ne-email').value.trim().toLowerCase();
    const gender=el.querySelector('#ne-gender').value;
    const errEl=el.querySelector('#add-err');
    if(!name){errEl.textContent='Name is required.';errEl.classList.add('show');return;}
    if(!email.endsWith(DOMAIN)){errEl.textContent=`Email must end with ${DOMAIN}`;errEl.classList.add('show');return;}
    if(S.adminEmps.find(e=>e.email===email)){errEl.textContent='This email is already registered.';errEl.classList.add('show');return;}
    errEl.classList.remove('show');
    const btn=el.querySelector('#add-btn');btn.innerHTML='<span class="spinner-sm"></span> Adding…';btn.disabled=true;
    const res=await api({action:'addEmployee',adminPin:ADMIN_PIN,name,email,gender});
    if(res.ok){await loadAdminEmps();el.querySelector('#ne-name').value='';el.querySelector('#ne-email').value='';toast(name+' added! Default PIN: 123456');S.adminTab='employees';renderAdminTab();}
    else{errEl.textContent=res.error||'Failed. Try again.';errEl.classList.add('show');}
    btn.textContent='Add Employee';btn.disabled=false;
  };
}

function renderModal() {
  if(!S.modal)return'';
  if(S.modal.type==='confirmDelete')return`
  <div class="modal-overlay">
    <div class="modal-box">
      <div class="modal-title">REMOVE EMPLOYEE?</div>
      <div class="modal-body">This will remove <strong style="color:var(--text);">${S.modal.name}</strong> (${S.modal.email}) from the system.<br><br>Their attendance records in the Google Sheet will be kept.</div>
      <div class="modal-actions">
        <button class="btn-ghost" id="modal-cancel" style="flex:1;">Cancel</button>
        <button class="btn-danger-sm" id="modal-ok" style="flex:1;padding:11px;border-radius:var(--r2);">Remove</button>
      </div>
    </div>
  </div>`;
  return'';
}

document.addEventListener('click',async e=>{
  if(e.target.id==='modal-cancel'){S.modal=null;render();}
  if(e.target.id==='modal-ok'&&S.modal?.type==='confirmDelete'){
    const {name,email}=S.modal;S.modal=null;
    const res=await api({action:'removeEmployee',adminPin:ADMIN_PIN,email});
    if(res.ok){await loadAdminEmps();toast(name+' removed.');}
    else toast('Failed to remove.');
    render();
  }
});
</script>
</body>
</html>
